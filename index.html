<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Triad | Portal</title>
    <link rel="stylesheet" href="style.css">
    <!-- Favicon link (Optional: replace with your icon later) -->
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div class="main-wrapper">
        <h1 class="dark-title">DARK TRIAD</h1>
        <p class="tagline">Advanced System Interface</p>
        
        <div class="input-area">
            <input type="text" id="main-input" placeholder="Request resource or identifier...">
            <button id="exec-btn">Execute</button>
        </div>

        <div class="status-grid">
            <div class="status-item">Secure Node</div>
            <div class="status-item">Active Link</div>
            <div class="status-item">Encrypted</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
