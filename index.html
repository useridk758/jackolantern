<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Triad | Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="matrix-bg"></div>

    <!-- MAIN INTERFACE -->
    <div class="main-content" id="main-ui">
        <h1 class="glow-title">DARK TRIAD</h1>
        <p class="subtitle">System Access Terminal</p>
        
        <div class="input-group">
            <input type="text" id="url-input" placeholder="Enter resource identifier...">
            <button id="exec-btn">EXECUTE</button>
        </div>

        <!-- LOADING AREA -->
        <div id="loader" class="hidden">
            <div class="spinner"></div>
            <p class="loading-text">ESTABLISHING LINK...</p>
        </div>

        <!-- ERROR MESSAGE (Only shows on failure) -->
        <div id="error-box" class="hidden">
            <p>CRITICAL ERROR: Connection Refused. Resource is protected or invalid.</p>
        </div>
    </div>

    <!-- WEBSITE VIEW (Hidden until loaded) -->
    <div id="display-overlay" class="hidden">
        <div class="top-bar">
            <span id="display-url"></span>
            <button id="close-btn">DISCONNECT</button>
        </div>
        <iframe id="target-frame"></iframe>
    </div>

    <script src="script.js"></script>
</body>
</html>
